x-app-env-file: &app_env_file ${APP_ENV_FILE:-.env.dev}

services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NUXT_TELEMETRY_DISABLED=1
      - DJANGO_INTERNAL_BASE=http://web:8000
      - DJANGO_PUBLIC_BASE=http://localhost:8000
    command: sh -c "npm install && npx nuxt dev --host 0.0.0.0"
    depends_on:
      - web

  web:
    build: ./backend
    env_file:
      - *app_env_file
    command: >
      bash -c "/opt/venv/bin/python manage.py collectstatic --noinput &&
      /opt/venv/bin/gunicorn --workers=$${GUNICORN_WORKERS:-2}
      --timeout=$${GUNICORN_TIMEOUT:-300}
      --max-requests=$${GUNICORN_MAX_REQUESTS:-300}
      --max-requests-jitter=$${GUNICORN_MAX_REQUESTS_JITTER:-50}
      --bind 0.0.0.0:8000 tcf_irn.wsgi:application"
    volumes:
      - ./backend:/app
      - ./product_research:/product_research:ro
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    env_file:
      - *app_env_file
    command: /opt/venv/bin/celery -A tcf_irn worker --loglevel=info --concurrency=$${CELERY_CONCURRENCY:-2}
    volumes:
      - ./backend:/app
      - ./product_research:/product_research:ro
      - backend_media:/app/media
    depends_on:
      - db
      - redis

  flower:
    build: ./backend
    profiles:
      - monitoring
    env_file:
      - *app_env_file
    command: /opt/venv/bin/celery -A tcf_irn flower --port=5555
    volumes:
      - ./backend:/app
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker

  db:
    image: postgres:16-alpine
    env_file:
      - *app_env_file
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  backend_media:
  backend_static:
  postgres_data:
  redis_data:
