<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TCF IRN Practice{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <a href="{% url 'dashboard' %}" class="min-w-0">
        <div class="text-lg font-bold text-slate-950">TCF IRN Practice</div>
        <div class="text-xs text-slate-500">Timed simulations for oral and written production</div>
      </a>
      <nav class="flex items-center gap-2 text-sm">
        {% if user.is_authenticated %}
          <a class="rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900" href="{% url 'practice_start' %}">Practice</a>
          <a class="rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900" href="{% url 'history' %}">History</a>
          <a class="rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900" href="{% url 'admin:index' %}">Admin</a>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-700 hover:bg-slate-100" type="submit">Log out</button>
          </form>
        {% else %}
          <a class="rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900" href="{% url 'login' %}">Log in</a>
          <a class="rounded-md bg-indigo-600 px-3 py-2 font-medium text-white hover:bg-indigo-700" href="{% url 'signup' %}">Sign up</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div class="rounded-md border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
