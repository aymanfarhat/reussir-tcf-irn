{% extends "base.html" %}

{% block title %}Targeted practice - TCF IRN Practice{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-950">Targeted practice</h1>
    <p class="mt-1 text-sm text-slate-500">Start one timed task by type, theme, or both. Feedback is saved in your history.</p>
  </div>

  <form class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm" method="post">
    {% csrf_token %}
    <div class="grid gap-5 md:grid-cols-2">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Task type</span>
        <select class="mt-2 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm" name="task_number">
          <option value="">Any task</option>
          {% for task in task_definitions %}
            <option value="{{ task.task_number }}">Task {{ task.task_number }} - {{ task.name_fr }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Theme</span>
        <select class="mt-2 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm" name="theme">
          <option value="">Any theme</option>
          {% for theme in themes %}
            <option value="{{ theme }}">{{ theme }}</option>
          {% endfor %}
        </select>
      </label>
    </div>
    <button class="mt-6 rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700" type="submit">Start practice task</button>
  </form>
</div>
{% endblock %}
