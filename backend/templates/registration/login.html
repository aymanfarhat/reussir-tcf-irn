{% extends "base.html" %}

{% block title %}Log in - TCF IRN Practice{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-xl font-bold text-slate-950">Log in</h1>
  <form class="mt-6 space-y-4" method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div>
      <label class="text-sm font-medium text-slate-700" for="{{ form.username.id_for_label }}">Username</label>
      <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required>
      {{ form.username.errors }}
    </div>
    <div>
      <label class="text-sm font-medium text-slate-700" for="{{ form.password.id_for_label }}">Password</label>
      <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
      {{ form.password.errors }}
    </div>
    <button class="w-full rounded-md bg-indigo-600 px-4 py-2 font-medium text-white hover:bg-indigo-700" type="submit">Log in</button>
  </form>
  <p class="mt-4 text-sm text-slate-600">No account yet? <a class="font-medium text-indigo-700 hover:text-indigo-900" href="{% url 'signup' %}">Create one</a>.</p>
</div>
{% endblock %}
